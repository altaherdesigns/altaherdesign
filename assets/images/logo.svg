<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#a88a35"/>
    </linearGradient>
  </defs>
  <!-- Oval shape -->
  <ellipse cx="100" cy="60" rx="90" ry="50" fill="#0d6e5e" stroke="url(#goldGrad)" stroke-width="2"/>
  <ellipse cx="100" cy="60" rx="84" ry="44" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
  <!-- Main text -->
  <text x="100" y="54" text-anchor="middle" fill="#f8f5f0" font-family="Fraunces, Georgia, serif" font-size="20" font-weight="500" letter-spacing="0.5">AL TAHER</text>
  <text x="100" y="74" text-anchor="middle" fill="#e8c96a" font-family="Fraunces, Georgia, serif" font-size="11" font-style="italic" letter-spacing="2">GROUP</text>
  <!-- Decorative lines -->
  <line x1="30" y1="60" x2="48" y2="60" stroke="#c9a84c" stroke-width="0.5"/>
  <line x1="152" y1="60" x2="170" y2="60" stroke="#c9a84c" stroke-width="0.5"/>
  <!-- Since 1984 -->
  <text x="100" y="92" text-anchor="middle" fill="#c9a84c" font-family="Outfit, sans-serif" font-size="8" letter-spacing="2">SINCE 1984</text>
</svg>
